# Cloud Build CI/CD Pipeline — Baby Kingdom Admin
# 一键部署: gcloud builds submit --config=cloudbuild.yaml --substitutions=_CLOUD_SQL_INSTANCE=PROJECT:REGION:INSTANCE
#
# 架构: 2 个 Cloud Run 服务
#   - babykingdom-backend: API + Tasks + Cron
#   - babykingdom-frontend: Nginx 反代 + Vue SPA（同域名访问，无 CORS）

substitutions:
  _REGION: us-central1
  _AR_REPO: babykingdom
  _CLOUD_SQL_INSTANCE: ''  # 必填: PROJECT_ID:REGION:INSTANCE_NAME
  _BACKEND_SA: babykingdom-backend-sa@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  # ===== 1. Build Images (并行) =====

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest'
      - './frontend'

  # ===== 2. Push Images =====

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend']
    waitFor: ['build-frontend']

  # ===== 3. Deploy Backend to Cloud Run =====
  # 数据库迁移在 Backend 启动时自动执行 (server.ts: prisma migrate deploy)

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'babykingdom-backend'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--service-account'
      - '${_BACKEND_SA}'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,ADMIN_USERNAME=admin,ADMIN_EMAIL=babykingdom@mintinglabs.com,ADMIN_PASSWORD=presslogic123'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300s'
      - '--concurrency'
      - '80'
      - '--allow-unauthenticated'
    waitFor: ['push-backend']

  # ===== 4. Deploy Frontend to Cloud Run =====
  # 需要先获取 Backend URL，注入到 Frontend 容器的 BACKEND_URL 环境变量
  # Nginx 通过 envsubst 将 BACKEND_URL 写入 nginx.conf

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$$(gcloud run services describe babykingdom-backend --region=${_REGION} --format='value(status.url)')
        gcloud run deploy babykingdom-frontend \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --set-env-vars="BACKEND_URL=$${BACKEND_URL}" \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=2 \
          --timeout=60s \
          --concurrency=200 \
          --port=8080 \
          --allow-unauthenticated
    waitFor: ['deploy-backend', 'push-frontend']

  # ===== 5. 输出部署信息 =====

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'print-urls'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "============================================"
        echo "  Deployment Complete!"
        echo "============================================"
        BACKEND_URL=$$(gcloud run services describe babykingdom-backend --region=${_REGION} --format='value(status.url)' 2>/dev/null || echo "pending")
        FRONTEND_URL=$$(gcloud run services describe babykingdom-frontend --region=${_REGION} --format='value(status.url)' 2>/dev/null || echo "pending")
        echo "  Backend:  $${BACKEND_URL}"
        echo "  Frontend: $${FRONTEND_URL}"
        echo ""
        echo "  首次部署后续步骤:"
        echo "  1. 运行 setup-scheduler.sh 创建定时任务:"
        echo "     ./scripts/setup-scheduler.sh ${PROJECT_ID} $${BACKEND_URL}"
        echo "============================================"
    waitFor: ['deploy-frontend']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
