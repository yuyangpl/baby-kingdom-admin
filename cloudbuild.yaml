# Cloud Build CI/CD Pipeline
# Trigger: push to main branch
# Flow: build images → push to AR → migrate DB → deploy Cloud Run → deploy frontend

substitutions:
  _REGION: asia-east1
  _AR_REPO: bk-admin
  _CLOUD_SQL_INSTANCE: ''  # Set via trigger: PROJECT_ID:REGION:INSTANCE_NAME

steps:
  # ===== Build =====

  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest'
      - './backend'

  # Build frontend
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'cd frontend && npm ci && npm run build'

  # ===== Push Images =====

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend']

  # ===== Database Migration =====

  # Run Prisma migrate deploy (uses Cloud SQL Proxy)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'db-migrate'
    args:
      - 'run'
      - '--rm'
      - '--network=cloudbuild'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'
      - 'npx'
      - 'prisma'
      - 'migrate'
      - 'deploy'
    env:
      - 'DATABASE_URL=$$DATABASE_URL'
    secretEnv: ['DATABASE_URL']

  # ===== Deploy Backend to Cloud Run =====

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    waitFor: ['db-migrate']
    args:
      - 'run'
      - 'deploy'
      - 'bk-backend'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--timeout'
      - '300s'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest'

  # ===== Deploy Frontend to Cloud Storage =====

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', 'frontend/dist/', 'gs://${PROJECT_ID}-frontend/']

  # ===== Print URLs =====

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'print-urls'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe bk-backend --region=${_REGION} --format='value(status.url)')
        echo "========================================"
        echo "  Deploy complete!"
        echo "  Backend:  $${BACKEND_URL}"
        echo "========================================"
        echo ""
        echo "  Next step: run Cloud Scheduler setup"
        echo "  ./scripts/setup-scheduler.sh ${PROJECT_ID} $${BACKEND_URL}"

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
